# GP360 Biometric Service Configuration

# API Configuration
api.url=http://localhost:8000/api
api.timeout=30000

# Database Configuration (for direct connection if API is unavailable)
db.url=jdbc:mysql://localhost:3306/gp360
db.user=root
db.password=
db.driver=com.mysql.cj.jdbc.Driver

# Biometric Device Configuration
device.id=1
device.name=DigitalPersona 4500

# Capture Configuration
capture.min_quality=60
capture.max_attempts=3
capture.timeout=30000

# UI Configuration
ui.theme=system
ui.language=es

# Logging
logging.level=INFO
logging.file=biometric-service.log